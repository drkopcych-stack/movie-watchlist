<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif;background:#f4f4f2;color:#111;font-size:14px;line-height:1.5}
a{color:inherit}
.app{max-width:880px;margin:0 auto;padding:20px 16px 80px}
h1{font-size:20px;font-weight:600;letter-spacing:-.02em}
.sub{font-size:13px;color:#777;margin:3px 0 20px}

/* Setup card */
.card{background:#fff;border:1px solid #e2e2e2;border-radius:12px;padding:16px;margin-bottom:14px}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-hdr h2{font-size:13px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em}
.card-hdr button{font-size:12px;color:#888;background:none;border:none;cursor:pointer;padding:0}
.key-row{display:flex;gap:8px;margin-bottom:14px}
.key-row input{flex:1;font-size:13px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-family:inherit;background:#fff;color:#111}
.key-row input:focus{outline:none;border-color:#666}
.key-row input::placeholder{color:#bbb}
.btn{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#555;font-family:inherit;white-space:nowrap;transition:all .15s}
.btn:hover{background:#f5f5f5}
.btn.primary{background:#111;color:#fff;border-color:#111}
.btn.primary:hover{background:#333}
.btn.saved{background:#166534;color:#fff;border-color:#166534}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.success{background:#15803d;color:#fff;border-color:#15803d}
.svc-label{font-size:12px;color:#888;margin-bottom:8px}
.svc-chips{display:flex;flex-wrap:wrap;gap:6px}
.svc-chip{font-size:12px;padding:5px 13px;border-radius:20px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-weight:500;color:#666;transition:all .15s}
.svc-chip:hover{border-color:#999}
.svc-chip.on{color:#fff;border-color:transparent}
.key-help{font-size:11px;color:#aaa;margin-top:8px}
.key-help a{color:#2563eb;text-decoration:none}
.key-help a:hover{text-decoration:underline}

/* Age tabs */
.age-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.age-btn{font-size:13px;padding:5px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-weight:500;color:#666;position:relative;transition:all .15s}
.age-btn:hover{border-color:#999}
.age-btn.on{background:#111;color:#fff;border-color:#111}
.age-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;position:absolute;top:3px;right:3px}

/* Toolbar */
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.filter-btn{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666;transition:all .15s}
.filter-btn:hover{border-color:#999}
.filter-btn.on{background:#111;color:#fff;border-color:#111}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.stats-txt{font-size:12px;color:#888;white-space:nowrap}
.refresh-btn{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666;transition:all .15s}
.refresh-btn:hover:not(:disabled){background:#f5f5f5}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed}

/* Fetch progress */
.fetch-bar-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:8px 14px;margin-bottom:10px}
.fetch-bar-row p{font-size:12px;color:#888;flex-shrink:0}
.fetch-track{flex:1;height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden}
.fetch-fill{height:100%;background:#6b7280;border-radius:2px;transition:width .2s}

/* Movie list */
.list{display:flex;flex-direction:column;gap:3px}
.row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid #ebebeb;background:#fff;flex-wrap:wrap;transition:opacity .2s}
.row:hover{border-color:#ccc}
.row.watched{opacity:.35}
.wk{font-size:10px;color:#d0d0d0;min-width:22px;text-align:right;flex-shrink:0}
.cb{cursor:pointer;flex-shrink:0;width:14px;height:14px;accent-color:#555}
.title{flex:1;min-width:100px;font-size:13px;font-weight:500;color:#111}
.title.watched{text-decoration:line-through;color:#bbb;font-weight:400}
.yr{font-size:11px;color:#ccc;margin-left:4px;font-weight:400}
.sx{font-size:9px;color:#f59e0b;margin-left:2px}
.svc-tags{display:flex;gap:3px;flex-wrap:wrap}
.svc-tag{font-size:10px;padding:2px 8px;border-radius:20px;color:#fff;font-weight:600;white-space:nowrap}
.pending{font-size:11px;color:#ddd;font-style:italic}
.not-found{font-size:10px;color:#e0e0e0}
.jw{font-size:11px;color:#2563eb;text-decoration:none;white-space:nowrap;flex-shrink:0;margin-left:auto;padding-left:6px}
.jw:hover{text-decoration:underline}
.empty{text-align:center;color:#aaa;padding:3rem 0;font-size:14px}

/* No-key screen */
.nokey{text-align:center;padding:4rem 2rem;color:#888;background:#fff;border-radius:12px;border:1px solid #e2e2e2}
.nokey h2{font-size:17px;font-weight:600;color:#333;margin-bottom:8px}
.nokey p{font-size:14px;line-height:1.7;max-width:400px;margin:0 auto}
.nokey a{color:#2563eb}

@media(prefers-color-scheme:dark){
  body{background:#0f0f0f;color:#e0e0e0}
  .card,.row,.fetch-bar-row,.nokey{background:#1a1a1a;border-color:#2a2a2a}
  .svc-chip,.filter-btn,.refresh-btn,.age-btn,.btn,.key-row input{background:#1a1a1a;border-color:#333;color:#aaa}
  .key-row input{color:#e0e0e0}
  .key-row input::placeholder{color:#555}
  .age-btn.on{background:#e0e0e0;color:#111;border-color:#e0e0e0}
  .filter-btn.on{background:#e0e0e0;color:#111;border-color:#e0e0e0}
  .btn.primary{background:#e0e0e0;color:#111;border-color:#e0e0e0}
  .btn.saved{background:#166534;color:#fff;border-color:#166534}
  .title{color:#e0e0e0}
  .row:hover{border-color:#444}
  .nokey h2{color:#e0e0e0}
  h1{color:#e0e0e0}
  .fetch-track{background:#2a2a2a}
}

.sync-row{display:flex;align-items:center;gap:5px;font-size:12px;margin-bottom:8px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot.green{background:#22c55e}.dot.amber{background:#f59e0b}.dot.red{background:#ef4444}.dot.grey{background:#ccc}
.step{font-size:13px;color:#777;margin-bottom:10px;line-height:1.7}
.step strong{color:#333}.step a{color:#2563eb;text-decoration:none}.step a:hover{text-decoration:underline}
.sql-block{background:#1a1a1a;color:#d4d4d4;border-radius:8px;padding:28px 14px 12px;font-family:monospace;font-size:12px;line-height:1.7;margin:6px 0 12px;overflow-x:auto;white-space:pre;position:relative}
.copy-btn{font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid #555;background:transparent;color:#aaa;cursor:pointer;position:absolute;top:8px;right:8px}
.copy-btn:hover{background:#333;color:#fff}
.err{font-size:12px;color:#dc2626;margin-top:6px}
</style>

let sbUrl   = localStorage.getItem("wl-sb-url") || "";
let sbKey   = localStorage.getItem("wl-sb-key") || "";
let apiKey  = "";
let subs    = [];
let watched = {};
let cache   = JSON.parse(localStorage.getItem("wl-cache") || "{}");
let age="all", filter="all", fetching=false, fetchDone=0, fetchTotal=0, fetchId=0;
let sbClient=null, dbReady=false, dbError="", showSetup=!sbUrl||!sbKey;

// ─── Supabase ──────────────────────────────────────────────────────────────────
function initSB(){
  if(!sbUrl||!sbKey)return;
  try{ sbClient=supabase.createClient(sbUrl,sbKey); }
  catch(e){ dbError="Could not connect. Check your URL and key."; render(); }
}
async function loadFromDB(){
  if(!sbClient)return;
  dbError="";
  try{
    const{data:s,error:se}=await sbClient.from("settings").select("*");
    if(se)throw se;
    s.forEach(r=>{
      if(r.key==="tmdb_key")apiKey=r.value;
      if(r.key==="services")subs=JSON.parse(r.value||"[]");
    });
    const{data:w,error:we}=await sbClient.from("watched").select("*").eq("is_watched",true);
    if(we)throw we;
    watched={};w.forEach(r=>{watched[r.movie_key]=true;});
    dbReady=true;
  }catch(e){dbError=e.message||"Could not load data.";}
  render();
  if(apiKey&&dbReady)startFetch(age);
}
async function saveSetting(k,v){if(sbClient)await sbClient.from("settings").upsert({key:k,value:String(v)});}
async function saveWatched(k,v){if(sbClient)await sbClient.from("watched").upsert({movie_key:k,is_watched:v});}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const mk=(t,y)=>t+"|"+y, esc=s=>s.replace(/\\/g,"\\\\").replace(/'/g,"\\'"), sleep=ms=>new Promise(r=>setTimeout(r,ms));
const SQL=`create table if not exists settings (\n  key   text primary key,\n  value text\n);\ncreate table if not exists watched (\n  movie_key  text primary key,\n  is_watched boolean default false\n);\nalter table settings enable row level security;\nalter table watched  enable row level security;\ncreate policy "allow_all" on settings for all using (true) with check (true);\ncreate policy "allow_all" on watched  for all using (true) with check (true);`;

const CACHE_TTL=3*24*60*60*1000, FETCH_DELAY=220;

function getCached(t,y){const c=cache[mk(t,y)];if(!c)return null;if(Date.now()-c.ts>CACHE_TTL)return null;return c;}
function availableOn(t,y){
  const c=getCached(t,y);if(!c||!c.providers)return[];
  return SERVICES.filter(svc=>{
    if(!subs.includes(svc.id))return false;
    return[svc.id,...(svc.alt||[])].some(id=>c.providers.includes(id));
  });
}
async function fetchMovie(title,year){
  if(getCached(title,year))return;
  const k=mk(title,year);
  try{
    let r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${encodeURIComponent(title)}&year=${year}&include_adult=false`);
    let d=await r.json();
    if(d.status_code===7){apiKey="";await saveSetting("tmdb_key","");render();throw new Error("bad_key");}
    if(!d.results?.length){
      r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${encodeURIComponent(title)}&include_adult=false`);
      d=await r.json();
    }
    if(!d.results?.length){cache[k]={notFound:true,providers:[],ts:Date.now()};return;}
    const id=d.results[0].id;
    const pr=await fetch(`https://api.themoviedb.org/3/movie/${id}/watch/providers?api_key=${apiKey}`);
    const pd=await pr.json();
    const us=pd.results?.US||{};
    const flat=(us.flatrate||[]).map(p=>p.provider_id);
    const free=(us.free||[]).map(p=>p.provider_id);
    cache[k]={tmdbId:id,providers:[...new Set([...flat,...free])],ts:Date.now()};
  }catch(e){
    if(e.message==="bad_key")throw e;
    cache[k]={error:true,providers:[],ts:Date.now()};
  }
}
async function startFetch(targetAge){
  if(!apiKey)return;
  const myId=++fetchId;
  const movies=M[targetAge]||[];
  const toFetch=movies.filter(([t,y])=>!getCached(t,y));
  if(!toFetch.length){renderToolbar();renderList();return;}
  fetching=true;fetchDone=0;fetchTotal=toFetch.length;renderToolbar();
  try{
    for(const[title,year]of toFetch){
      if(fetchId!==myId)return;
      await fetchMovie(title,year);fetchDone++;renderToolbar();renderList();await sleep(FETCH_DELAY);
    }
  }catch(e){if(e.message==="bad_key"){showSetup=true;render();return;}}
  if(fetchId===myId){fetching=false;try{localStorage.setItem("wl-cache",JSON.stringify(cache));}catch(e){}renderToolbar();}
}

// ─── Render ────────────────────────────────────────────────────────────────────
function renderSetup(){
  const el=document.getElementById("setup");if(!el)return;
  const statusDot=dbReady
    ?`<span class="dot green"></span><span style="font-size:12px;color:#15803d">Connected &amp; syncing</span>`
    :dbError
      ?`<span class="dot red"></span><span style="font-size:12px;color:#dc2626">${dbError}</span>`
      :`<span class="dot grey"></span><span style="font-size:12px;color:#888">Not connected</span>`;
  const chips=SERVICES.map(s=>{const on=subs.includes(s.id);return`<button class="svc-chip${on?" on":""}" style="${on?`background:${s.color};border-color:${s.color}`:""}" onclick="toggleSvc(${s.id})">${s.name}</button>`;}).join("");
  el.innerHTML=`<div class="card">
    <div class="card-hdr">
      <h2>Setup</h2>
      <div class="card-hdr-btns">
        <div class="sync-row">${statusDot}</div>
        ${dbReady||dbError?`<button class="btn small" onclick="toggleSetup()">${showSetup?"Hide":"Edit"}</button>`:""}
      </div>
    </div>
    ${showSetup||!dbReady?`
      <div class="step"><strong>Step 1 — Create a free Supabase project</strong><br>
      Go to <a href="https://supabase.com" target="_blank">supabase.com</a>, create a free project, open the <strong>SQL Editor</strong> and run this:</div>
      <div class="sql-block"><button class="copy-btn" onclick="copySQL()">Copy</button>${SQL}</div>
      <div class="step"><strong>Step 2 — Enter your Supabase credentials</strong><br>
      Found under <strong>Project Settings → API</strong>. Use "Project URL" and "anon public" key.</div>
      <div class="field-row">
        <input id="sbUrlIn" type="text" placeholder="Project URL  (https://xxxx.supabase.co)" value="${sbUrl}">
      </div>
      <div class="field-row">
        <input id="sbKeyIn" type="password" placeholder="anon public key" value="${sbKey}">
        <button class="btn primary" onclick="connectSB()">Connect</button>
      </div>
      ${dbError?`<p class="err">${dbError}</p>`:""}
      <br>
      <div class="step"><strong>Step 3 — TMDB API key</strong></div>
      <div class="field-row">
        <input id="tmdbIn" type="password" placeholder="TMDB API key" value="${apiKey}">
        <button class="btn${apiKey?" success":""}" onclick="saveTMDB()" ${!dbReady?"disabled":""}>${apiKey?"Saved \u2713":"Save"}</button>
      </div>
      ${!dbReady?`<p style="font-size:11px;color:#aaa;margin-top:4px">Connect Supabase first</p>`:""}
      <br>
      <p class="step"><strong>Step 4 — Your streaming services</strong></p>
      <div class="svc-chips">${chips}</div>
    `:`<div class="svc-chips">${chips}</div>`}
  </div>`;
}
function renderAgeTabs(){
  const el=document.getElementById("agetabs");if(!el)return;
  if(!dbReady){el.innerHTML="";return;}
  const ages=Array.from({length:16},(_,i)=>i+5);
  const allMovies=ages.flatMap(a=>M[a]||[]);
  const allW=allMovies.filter(([t,y])=>watched[mk(t,y)]).length;
  const allDone=allMovies.length>0&&allW===allMovies.length;
  el.innerHTML=`<div class="age-tabs">
    <button class="age-btn${age==="all"?" on":""}" onclick="setAge('all')">All${allDone?'<span class="age-dot"></span>':""}</button>
    ${ages.map(a=>{
      const w=(M[a]||[]).filter(([t,y])=>watched[mk(t,y)]).length;
      const done=(M[a]||[]).length>0&&w===(M[a]||[]).length;
      return`<button class="age-btn${age===a?" on":""}" onclick="setAge(${a})">${a}${done?'<span class="age-dot"></span>':""}</button>`;
    }).join("")}</div>`;
}
function renderToolbar(){
  const el=document.getElementById("toolbar");if(!el)return;
  if(!dbReady){el.innerHTML="";return;}
  const ages=Array.from({length:16},(_,i)=>i+5);
  const movies=age==="all"?ages.flatMap(a=>M[a]||[]):M[age]||[];
  const w=movies.filter(([t,y])=>watched[mk(t,y)]).length;
  const av=movies.filter(([t,y])=>availableOn(t,y).length>0).length;
  const pct=movies.length?Math.round(w/movies.length*100):0;
  const progress=fetching?`<div class="fetch-bar-row"><p>Checking availability\u2026 ${fetchDone}/${fetchTotal}</p><div class="fetch-track"><div class="fetch-fill" style="width:${Math.round(fetchDone/Math.max(fetchTotal,1)*100)}%"></div></div></div>`:"";
  el.innerHTML=`${progress}<div class="toolbar">
    <button class="filter-btn${filter==="all"?" on":""}"       onclick="setFilter('all')">All</button>
    <button class="filter-btn${filter==="available"?" on":""}" onclick="setFilter('available')">Available now</button>
    <button class="filter-btn${filter==="unwatched"?" on":""}" onclick="setFilter('unwatched')">Unwatched</button>
    <button class="filter-btn${filter==="both"?" on":""}"      onclick="setFilter('both')">Available &amp; unwatched</button>
    <div class="toolbar-right">
      <span class="stats-txt">${av>0?av+" on your services \xb7 ":""}${w}/${movies.length} watched (${pct}%)</span>
      <button class="refresh-btn" onclick="refreshAge()" ${fetching?"disabled":""}>&#8635; Refresh</button>
    </div>
  </div>`;
}
function renderList(){
  const el=document.getElementById("list");if(!el)return;
  if(!dbReady){el.innerHTML=`<div class="nokey"><h2>Connect Supabase to get started</h2><p>Supabase keeps your watch progress and settings synced across every device your family uses. It is free \u2014 follow the setup steps above.</p><p><a href="https://supabase.com" target="_blank">supabase.com \u2192</a></p></div>`;return;}
  const ages=Array.from({length:16},(_,i)=>i+5);
  const movies=age==="all"?ages.flatMap(a=>M[a]||[]):M[age]||[];
  const filtered=movies.filter(([t,y])=>{
    const avail=availableOn(t,y).length>0,isW=!!watched[mk(t,y)];
    if(filter==="available")return avail;if(filter==="unwatched")return!isW;if(filter==="both")return avail&&!isW;return true;
  });
  if(!filtered.length){el.innerHTML=`<div class="empty">No films match this filter.</div>`;return;}
  el.innerHTML=`<div class="list">${filtered.map(([title,year,sens])=>{
    const isW=!!watched[mk(title,year)];
    const ageForFilm=age==="all"?ages.find(a=>(M[a]||[]).some(([t,y])=>t===title&&y===year)):age;
    const ageMovies=M[ageForFilm]||[];
    const weekN=age==="all"?`${ageForFilm}·W${ageMovies.findIndex(([t,y])=>t===title&&y===year)+1}`:movies.findIndex(([t,y])=>t===title&&y===year)+1;
    const c=getCached(title,year);
    const svcs=availableOn(title,year);
    let status="";
    if(!c)status=`<span class="pending">\u2014</span>`;
    else if(c.notFound||c.error)status=`<span class="not-found">not found</span>`;
    else if(svcs.length)status=`<div class="svc-tags">${svcs.map(s=>`<span class="svc-tag" style="background:${s.color}">${s.name}</span>`).join("")}</div>`;
    return`<div class="row${isW?" watched":""}">
      <span class="wk">W${weekN}</span>
      <input type="checkbox" class="cb" ${isW?"checked":""} onchange="toggleWatched('${esc(title)}',${year})">
      <span class="title${isW?" watched":""}">${title}<span class="yr">${year}${sens?'<span class="sx">\u2756</span>':""}</span></span>
      ${status}
      <a class="jw" href="https://www.justwatch.com/us/search?q=${encodeURIComponent(title)}" target="_blank" rel="noopener">JW \u2192</a>
    </div>`;
  }).join("")}</div>`;
}
function render(){renderSetup();renderAgeTabs();renderToolbar();renderList();}

// ─── Event handlers ────────────────────────────────────────────────────────────
window.copySQL=function(){navigator.clipboard.writeText(SQL).then(()=>{const b=document.querySelector(".copy-btn");if(b){b.textContent="Copied!";setTimeout(()=>b.textContent="Copy",2000);}});};
window.toggleSetup=function(){showSetup=!showSetup;renderSetup();};
window.connectSB=async function(){
  const url=(document.getElementById("sbUrlIn")?.value||"").trim();
  const key=(document.getElementById("sbKeyIn")?.value||"").trim();
  if(!url||!key)return;
  sbUrl=url;sbKey=key;
  localStorage.setItem("wl-sb-url",sbUrl);localStorage.setItem("wl-sb-key",sbKey);
  dbError="";dbReady=false;initSB();renderSetup();await loadFromDB();
};
window.saveTMDB=async function(){
  const v=(document.getElementById("tmdbIn")?.value||"").trim();if(!v)return;
  apiKey=v;await saveSetting("tmdb_key",v);renderSetup();startFetch(age);
};
window.toggleSvc=async function(id){
  id=Number(id);subs=subs.includes(id)?subs.filter(s=>s!==id):[...subs,id];
  await saveSetting("services",JSON.stringify(subs));renderSetup();renderToolbar();renderList();
};
window.setAge=function(a){age=a==="all"?"all":Number(a);fetching=false;render();if(apiKey&&dbReady){if(age==="all"){Array.from({length:16},(_,i)=>i+5).forEach(n=>startFetch(n));}else{startFetch(age);}}};
window.setFilter=function(f){filter=f;renderToolbar();renderList();};
window.toggleWatched=async function(t,y){
  const k=mk(t,y);watched[k]=!watched[k];await saveWatched(k,watched[k]);renderAgeTabs();renderList();
};
window.refreshAge=function(){
  const agesToRefresh=age==="all"?Array.from({length:16},(_,i)=>i+5):[age];
  agesToRefresh.forEach(a=>(M[a]||[]).forEach(([t,y])=>{delete cache[mk(t,y)];}));
  try{localStorage.setItem("wl-cache",JSON.stringify(cache));}catch(e){}
  agesToRefresh.forEach(a=>startFetch(a));
};

// ─── Init ──────────────────────────────────────────────────────────────────────
initSB();
render();
if(sbClient)loadFromDB();
</script>
</body>
